<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Portal Warga</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(6, 78, 59, 0.95); color: #ffffff; z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .modern-in { width: 100%; background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 14px 16px; border-radius: 1rem; font-size: 12px; font-weight: 600; color: #1e293b; transition: all 0.2s ease; }
        .modern-in:focus { outline: none; background-color: #ffffff; border-color: #059669; box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

<div id="loadingOverlay" class="loading-overlay">
    <div class="flex flex-col items-center gap-2">
        <i class="fa-solid fa-spinner animate-spin text-xl"></i>
        <span>Memuat Dashboard...</span>
    </div>
</div>

<!-- HEADER PORTAL -->
<header class="bg-white border-b border-slate-100 p-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
        <img src="logo.png" alt="Logo" class="w-9 h-9 object-contain rounded-xl">
        <div>
            <h1 id="portalTitle" class="text-sm font-extrabold text-emerald-950 tracking-tight leading-none">TUNTAS</h1>
            <p id="portalSub" class="text-[9px] font-bold text-slate-400 uppercase tracking-wide mt-0.5">Portal Anggota Tetap</p>
        </div>
    </div>
    <button onclick="logoutWarga()" class="w-8 h-8 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center hover:bg-rose-100 active:scale-95 transition-all">
        <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
    </button>
</header>

<main class="p-4 space-y-4 max-w-md mx-auto animate-fade-in">
    
    <!-- CARD UTAMA PROFILE & RINGKASAN -->
    <div id="mainHeroCard" class="bg-gradient-to-br from-emerald-950 via-emerald-900 to-teal-950 text-white p-5 rounded-[2.5rem] shadow-xl space-y-4 border border-emerald-800/40">
        <div class="flex items-center gap-3.5">
            <div class="w-12 h-12 rounded-full bg-emerald-800/50 border border-emerald-500/30 flex items-center justify-center text-xl text-emerald-300">
                <i class="fa-solid fa-user-badge"></i>
            </div>
            <div>
                <h2 id="wargaNama" class="text-base font-extrabold uppercase tracking-wide">Nama Warga</h2>
                <p id="wargaStatusBadge" class="text-[9px] font-black bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-md inline-block uppercase tracking-wider mt-1 border border-emerald-500/30">Anggota Tetap</p>
            </div>
        </div>
        <div class="pt-3 border-t border-emerald-800/60 flex justify-between items-center">
            <div>
                <p id="heroLabelRingkasan" class="text-[8px] text-emerald-400 font-black uppercase tracking-widest">Total Kontribusi Anda</p>
                <h3 id="heroValueRingkasan" class="text-xl font-extrabold mt-0.5">Rp 0</h3>
            </div>
            <div id="heroIconInfo" class="text-2xl text-emerald-700/60"><i class="fa-solid fa-shield-heart"></i></div>
        </div>
    </div>

    <!-- KHUSUS TETAP: STATUS OPERASIONAL SAMPAH BULANAN -->
    <div id="sectionStatusTetap" class="grid grid-cols-2 gap-3">
        <div class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm text-center space-y-1">
            <p class="text-[8px] font-black text-slate-400 uppercase tracking-wider">Status Bulan Ini</p>
            <div class="text-xs font-black text-emerald-600 uppercase tracking-wide bg-emerald-50 py-1 px-2 rounded-lg inline-block">LUNAS AMAN</div>
        </div>
        <div class="bg-white border border-slate-100 p-4 rounded-2xl shadow-sm text-center space-y-1">
            <p class="text-[8px] font-black text-slate-400 uppercase tracking-wider">Truk Sampah Terakhir</p>
            <div class="text-xs font-black text-slate-700 uppercase tracking-wide bg-slate-100 py-1 px-2 rounded-lg inline-block">DIAMBIL (19:30)</div>
        </div>
    </div>

    <!-- TABEL ARSIP HISTORI PERSONAL (TETAP / PON) -->
    <div class="space-y-2">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Riwayat Transaksi Anda</h3>
        <div id="listRiwayatWargaPersonal" class="bg-white border border-slate-100 rounded-2xl divide-y divide-slate-100 shadow-sm overflow-hidden min-h-[100px]">
            <div class="p-6 text-center text-xs text-slate-400 font-bold uppercase">Memuat catatan...</div>
        </div>
    </div>

    <!-- KHUSUS TETAP: FORM ADUAN / ASPIRASI -->
    <div id="sectionSaranTetap" class="bg-white border border-slate-100 p-5 rounded-[2rem] shadow-sm space-y-3">
        <h3 class="text-xs font-black text-slate-800 uppercase tracking-wide flex items-center gap-1.5"><i class="fa-solid fa-comment-dots text-emerald-700"></i> Kotak Aspirasi Warga</h3>
        <form id="formSaranClient" onsubmit="kirimSaranWarga(event)" class="space-y-2">
            <textarea id="isiSaranClient" rows="2" placeholder="Ketik saran perbaikan, keluhan truk sampah, dll..." class="modern-in !p-3 text-xs h-auto" required></textarea>
            <button type="submit" class="w-full bg-emerald-950 text-white py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wide">Kirim ke Pengurus RT</button>
        </form>
    </div>

</main>

<script>
    const DB_URL = "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app";
    
    // Anggap data login disimpan di localStorage saat sukses login di file auth/index.html
    // Struktur tiruan data dari localstorage:
    // localStorage.setItem("warga_session", JSON.stringify({ key: "-Nxxx", nama: "Budi PON", username: "081234", tipe: "PON" }));
    
    let SESI_WARGA = JSON.parse(localStorage.getItem("warga_session"));

    window.addEventListener('DOMContentLoaded', () => {
        // Proteksi route login sederhana
        if(!SESI_WARGA) {
            alert("Sesi habis, silakan login kembali.");
            window.location.href = "login.html";
            return;
        }

        inisialisasiTampilanDashboard();
    });

    function inisialisasiTampilanDashboard() {
        document.getElementById('wargaNama').innerText = SESI_WARGA.nama;
        
        if (SESI_WARGA.tipe === "PON") {
            // Ubah total branding UI menjadi khusus PON (Tema Amber / Oranye)
            document.getElementById('portalTitle').innerText = "TUNTAS PON";
            document.getElementById('portalSub').innerText = "Sistem Bakar Sampah Mandiri";
            
            const badge = document.getElementById('wargaStatusBadge');
            badge.innerText = "Non-Anggota (PON)";
            badge.className = "text-[9px] font-black bg-amber-500/20 text-amber-300 px-2 py-0.5 rounded-md inline-block uppercase tracking-wider mt-1 border border-amber-500/30";

            const heroCard = document.getElementById('mainHeroCard');
            heroCard.className = "bg-gradient-to-br from-amber-950 via-amber-900 to-stone-900 text-white p-5 rounded-[2.5rem] shadow-xl space-y-4 border border-amber-800/40";
            
            document.getElementById('heroLabelRingkasan').innerText = "Total Biaya Bakar Sampah";
            document.getElementById('heroIconInfo').innerHTML = `<i class="fa-solid fa-fire-burner"></i>`;
            document.getElementById('heroIconInfo').className = "text-2xl text-amber-700/60";

            // Sembunyikan elemen eksklusif milik warga tetap
            document.getElementById('sectionStatusTetap').classList.add('hidden');
            document.getElementById('sectionSaranTetap').classList.add('hidden');
        }

        muatHistoriPersonal();
    }

    async function muatHistoriPersonal() {
        try {
            const res = await fetch(`${DB_URL}/iuran_sampah.json`);
            const data = await res.json();
            const list = document.getElementById('listRiwayatWargaPersonal');
            list.innerHTML = "";

            if(!data) {
                list.innerHTML = `<div class="p-6 text-center text-xs text-slate-400 font-bold uppercase">Belum ada histori transaksi.</div>`;
                document.getElementById('loadingOverlay').style.display = 'none';
                return;
            }

            let totalBiayaTerakumulasi = 0;
            let barisHTML = "";

            // Urutkan data berdasarkan input terbaru
            const keys = Object.keys(data).reverse();

            keys.forEach(key => {
                const item = data[key];
                
                // Filter ketat: Hanya tampilkan data yang warga_key nya cocok dengan user yang sedang login
                if (item.warga_key === SESI_WARGA.key) {
                    totalBiayaTerakumulasi += parseInt(item.nominal) || 0;
                    const isUserPON = item.tipe_user === "PON";

                    barisHTML += `
                        <div class="p-4 flex justify-between items-center bg-white">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-xl ${isUserPON ? 'bg-amber-50 text-amber-700 border-amber-100' : 'bg-emerald-50 text-emerald-700 border-emerald-100'} flex items-center justify-center border">
                                    <i class="fa-solid ${isUserPON ? 'fa-fire' : 'fa-receipt'} text-xs"></i>
                                </div>
                                <div>
                                    <h4 class="text-xs font-extrabold text-slate-700 uppercase tracking-wide">${item.bulan}</h4>
                                    <p class="text-[9px] font-mono text-slate-400 mt-0.5">${item.tanggal}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-black text-slate-900 block">Rp ${parseInt(item.nominal).toLocaleString('id-ID')}</span>
                                <span class="text-[8px] font-mono text-slate-400 block tracking-tighter">ID: ${item.token_kuitansi}</span>
                            </div>
                        </div>
                    `;
                }
            });

            if(barisHTML === "") {
                list.innerHTML = `<div class="p-6 text-center text-xs text-slate-400 font-bold uppercase">Belum ada histori transaksi.</div>`;
            } else {
                list.innerHTML = barisHTML;
            }

            document.getElementById('heroValueRingkasan').innerText = "Rp " + totalBiayaTerakumulasi.toLocaleString('id-ID');

        } catch (err) {
            console.error("Gagal menarik data histori personal:", err);
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    function kirimSaranWarga(e) {
        e.preventDefault();
        const textAduan = document.getElementById('isiSaranClient').value.trim();
        
        const body = {
            nama_warga: SESI_WARGA.nama,
            warga_key: SESI_WARGA.key,
            isi_saran: textAduan,
            tanggal: new Date().toISOString().split('T')[0]
        };

        fetch(`${DB_URL}/saran_warga.json`, {
            method: 'POST',
            body: JSON.stringify(body)
        }).then(() => {
            alert("Aspirasi/Laporan berhasil dikirim ke Admin!");
            document.getElementById('formSaranClient').reset();
        });
    }

    function logoutWarga() {
        localStorage.removeItem("warga_session");
        window.location.href = "/members";
    }
</script>
</body>
</html>
