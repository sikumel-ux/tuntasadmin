<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Halaman Tidak Ditemukan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#0f766e,#16a34a,#22c55e);
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(5px);
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    bottom:-100px;
    right:-100px;
}

.card{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:24px;
    padding:45px 35px;
    text-align:center;
    color:#fff;
    box-shadow:0 20px 45px rgba(0,0,0,.25);
    animation:fade .8s ease;
    z-index:10;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.icon{
    font-size:70px;
    margin-bottom:15px;
}

h1{
    font-size:90px;
    font-weight:800;
    line-height:1;
}

h2{
    margin-top:10px;
    font-size:28px;
    font-weight:600;
}

p{
    margin:18px 0 35px;
    color:#e8f5e9;
    line-height:1.7;
    font-size:16px;
}

a{
    display:inline-block;
    text-decoration:none;
    background:#fff;
    color:#15803d;
    padding:14px 34px;
    border-radius:50px;
    font-weight:700;
    transition:.3s;
}

a:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(0,0,0,.25);
}

@media(max-width:480px){

h1{
    font-size:70px;
}

h2{
    font-size:22px;
}

p{
    font-size:15px;
}

}
</style>
</head>

<body>

<div class="card">

<div class="icon">🌿</div>

<h1>404</h1>

<h2>Halaman Tidak Ditemukan</h2>

<p>
Maaf, halaman yang Anda cari mungkin telah dipindahkan,
diubah, atau sudah tidak tersedia lagi.
</p>

<a href="/">Kembali</a>

</div>

</body>
</html>
