<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuitansi Digital - TUNTAS</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9; /* Background luar abu-abu terang */
        }
        /* Efek Dot Pattern Halus di Background Luar */
        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 16px 16px;
        }
        /* Efek Potongan Tiket di Sisi Samping */
        .ticket-card {
            position: relative;
            background: #ffffff;
        }
        .ticket-card::before, .ticket-card::after {
            content: '';
            position: absolute;
            top: 140px; /* Posisi cekungan sobekan kertas samping */
            width: 20px;
            height: 20px;
            background: #f1f5f9; /* Harus sama dengan background luar */
            border-radius: 50%;
            z-index: 10;
        }
        .ticket-card::before { left: -10px; }
        .ticket-card::after { right: -10px; }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4">

    <!-- KONTAINER UTAMA KUITANSI -->
    <div class="w-full max-w-sm ticket-card rounded-[2.5rem] shadow-xl border border-slate-200/60 overflow-hidden animate-fade-in p-6 space-y-6">
        
        <!-- HEADER KUITANSI -->
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-extrabold text-emerald-950 tracking-tight">TUNTAS.</h1>
            <p class="text-[9px] font-bold text-emerald-600 uppercase tracking-widest">Turun Tangan Atasi Sampah</p>
            <div class="pt-3 flex justify-center">
                <span class="text-[9px] font-black bg-slate-100 text-slate-700 px-3 py-1 rounded-full border border-slate-200 uppercase tracking-wider">
                    <i class="fa-solid fa-receipt mr-1 text-emerald-600"></i> Bukti Pembayaran
                </span>
            </div>
        </div>

        <!-- GARIS PUTUS-PUTUS PEMBATAS CEKUNGAN TIKET -->
        <div class="relative flex items-center justify-center my-2">
            <div class="w-full border-t-2 border-dashed border-slate-200"></div>
        </div>

        <!-- KONTEN UTAMA NOTIFIKASI PEMBAYARAN -->
        <div class="text-center px-2 space-y-5">
            <p class="text-xs text-slate-500 leading-relaxed font-medium">
                Diterima dari Bapak/Ibu <span id="lblNamaWarga" class="font-extrabold text-slate-800 uppercase">APRIYANTO</span>, untuk pembayaran sampah bulan <span id="lblBulanIuran" class="font-extrabold text-slate-800 uppercase">JUNI 2026</span>, sebesar:
            </p>

            <!-- CARD NOMINAL -->
            <div class="bg-gradient-to-b from-emerald-50/60 to-emerald-50/10 border border-emerald-100/80 p-5 rounded-3xl space-y-1 shadow-sm">
                <h2 id="lblNominal" class="text-3xl font-black text-emerald-800 tracking-tight">Rp 50.000</h2>
                <p id="lblTerbilang" class="text-[9px] font-bold text-emerald-600 italic tracking-wide">~ LIMA PULUH RIBU RUPIAH ~</p>
            </div>
        </div>

        <!-- QR CODE DENGAN INTEGRASI WRAPPER -->
        <div class="flex flex-col items-center justify-center space-y-2 py-2">
            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 shadow-inner">
                <!-- QR Code -->
                <img id="imgQrCode" src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=T-362982" alt="QR Code Verifikasi" class="w-32 h-32 object-contain mix-blend-multiply rounded-lg">
            </div>
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Terima Kasih Atas Partisipasi Anda</p>
        </div>

        <!-- FOOTER DETAIL DATA -->
        <div class="border-t border-slate-100 pt-4 flex justify-between items-end text-left">
            <div class="space-y-1">
                <div class="text-[9px] font-medium text-slate-400">TANGGAL : <span id="lblTanggalBayar" class="font-bold text-slate-700">15 JUNI 2026</span></div>
                <div class="text-[9px] font-medium text-slate-400">ID : <span id="lblTokenId" class="font-mono font-bold text-slate-700 tracking-wide">T-362982</span></div>
            </div>
            <div class="text-right space-y-0.5">
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Admin Tuntas</p>
                <p id="lblNamaPengurus" class="text-xs font-black text-emerald-800 uppercase tracking-tight">APRIYANTO</p>
            </div>
        </div>

    </div>

    <!-- UTILITY ACTION BUTTON (FLOATING BIAR BISA DI-PRINT / DI-SAVE WARGA) -->
    <div class="fixed bottom-4 right-4 flex flex-col gap-2 print:hidden">
        <button onclick="window.print()" class="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-slate-800 active:scale-95 transition-all">
            <i class="fa-solid fa-print text-xs"></i>
        </button>
    </div>

</body>
</html>
